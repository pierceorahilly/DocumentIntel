name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: cd lambda-auth && mvn clean package

      - name: Deploy to Lambda (Prod)
        if: github.ref == 'refs/heads/main'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          JAR_FILE="lambda-auth/target/bankbuddy-lambda-auth-1.0.0.jar"

          # Deploy to all 6 Lambda functions
          aws lambda update-function-code --function-name GuideYaAuthHandler --zip-file fileb://$JAR_FILE
          aws lambda update-function-code --function-name GuideYaInitiateUpload --zip-file fileb://$JAR_FILE
          aws lambda update-function-code --function-name GuideYaUploadHandler --zip-file fileb://$JAR_FILE
          aws lambda update-function-code --function-name GuideYaProcessUpload --zip-file fileb://$JAR_FILE
          aws lambda update-function-code --function-name GuideYaGetUploadStatus --zip-file fileb://$JAR_FILE
          aws lambda update-function-code --function-name GuideYaContactRequestHandler --zip-file fileb://$JAR_FILE

          echo "✅ Deployed to all 6 production Lambda functions"

      - name: Deploy to Lambda (Staging)
        if: github.ref == 'refs/heads/staging'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          echo "⏳ Staging deployment placeholder (set up staging Lambdas first)"
